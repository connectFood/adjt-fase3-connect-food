server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tc3
    username: connectfood
    password: connectfood

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: restaurant

  flyway:
    enabled: true
    schemas: restaurant
    default-schema: restaurant
    locations: classpath:db/migration

security:
  jwt:
    issuer: connectfood-auth
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32+_CHARS"
